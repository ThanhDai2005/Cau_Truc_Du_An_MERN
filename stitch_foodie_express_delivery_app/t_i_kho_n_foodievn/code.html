<div class="relative">

<input class="w-full h-12 pl-10 pr-4 rounded-xl border border-outline-variant bg-surface-bright focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors font-body-md text-body-md text-on-surface placeholder:text-outline" id="email" placeholder="Nhập email của bạn" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-1">
<div class="flex justify-between items-center">
<label class="font-label-md text-label-md text-on-surface" for="password">Mật khẩu</label>
<a class="font-label-sm text-label-sm text-primary hover:underline" href="#">Quên mật khẩu?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant">lock</span>
<input class="w-full h-12 pl-10 pr-10 rounded-xl border border-outline-variant bg-surface-bright focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors font-body-md text-body-md text-on-surface placeholder:text-outline" id="password" placeholder="Nhập mật khẩu" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined">visibility_off</span>
</button>
</div>
</div>
<!-- Submit Button -->
<button class="w-full h-12 bg-[#FF4D2D] hover:opacity-90 active:scale-95 transition-all duration-200 rounded-xl font-label-md text-label-md text-on-primary flex items-center justify-center gap-2 mt-2" type="submit">
                Đăng nhập
            </button>
</form>
<!-- Divider -->
<div class="flex items-center gap-4 py-2">
<div class="flex-1 h-px bg-outline-variant"></div>
<span class="font-label-sm text-label-sm text-on-surface-variant">hoặc</span>
